<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HalluciCheck – AI Hallucination Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --accent: #ff3c6e;
    --accent2: #00e5ff;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --warning: #ffb300;
    --safe: #00e676;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,60,110,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,229,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }
  .logo {
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 1rem;
    font-family: 'Space Mono', monospace;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  textarea {
    width: 100%;
    background: #0d0d15;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.6;
    padding: 1rem;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 1rem 2rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    margin-top: 1.25rem;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,60,110,0.35); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { opacity: 0.7; }

  /* Results */
  #results { display: none; animation: fadeUp 0.4s ease both; }
  .score-bar-wrap {
    margin: 1.5rem 0 1rem;
  }
  .score-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .score-track {
    height: 10px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .verdict {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 1rem;
    border-radius: 99px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }
  .verdict.high { background: rgba(255,60,110,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .verdict.medium { background: rgba(255,179,0,0.12); color: var(--warning); border: 1px solid var(--warning); }
  .verdict.low { background: rgba(0,230,118,0.1); color: var(--safe); border: 1px solid var(--safe); }

  .flags-title {
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .flag-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.9rem 1rem;
    background: #0d0d15;
    border-radius: 8px;
    margin-bottom: 0.6rem;
    border-left: 3px solid transparent;
    animation: fadeUp 0.3s ease both;
  }
  .flag-item.high { border-left-color: var(--accent); }
  .flag-item.medium { border-left-color: var(--warning); }
  .flag-item.low { border-left-color: var(--safe); }
  .flag-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .flag-text { font-size: 0.88rem; line-height: 1.5; color: var(--text); }
  .flag-text strong { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); display: block; margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.08em; }

  .summary-box {
    background: #0d0d15;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    margin-top: 1.2rem;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #c0c0d8;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 0.75rem;
  }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: none; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">⚡ AI Tool</div>
    <h1>HalluciCheck</h1>
    <p class="subtitle">// detect hallucinations in AI-generated text</p>
  </header>

  <div class="card" id="input-card">
    <label>Paste AI-generated text</label>
    <textarea id="inputText" placeholder="Paste any AI response here — ChatGPT, Gemini, Claude, etc. We'll analyze it for potential hallucinations, unsupported claims, and factual inconsistencies..."></textarea>
    <button class="btn" id="analyzeBtn" onclick="analyze()">
      <span class="spinner"></span>
      <span class="btn-text">Analyze for Hallucinations</span>
    </button>
  </div>

  <div class="card" id="results">
    <div id="verdict-wrap"></div>
    <div class="score-bar-wrap">
      <div class="score-label">
        <span>Hallucination Risk Score</span>
        <span id="scoreNum">0%</span>
      </div>
      <div class="score-track">
        <div class="score-fill" id="scoreFill"></div>
      </div>
    </div>
    <div class="flags-title">Detected Issues</div>
    <div id="flagsList"></div>
    <div class="summary-box" id="summaryBox"></div>
    <button class="btn reset-btn" onclick="reset()">← Analyze Another</button>
  </div>

  <footer>HalluciCheck v1.0 &nbsp;·&nbsp; Built for hackathon &nbsp;·&nbsp; Powered by Claude API</footer>
</div>

<script>
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";

async function analyze() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('Please paste some AI-generated text first.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = 'Analyzing...';

  try {
    const prompt = `You are an expert AI hallucination detector. Analyze the following AI-generated text for hallucinations, unsupported claims, factual errors, and suspicious statements.

AI Text to analyze:
"""
${text}
"""

Respond ONLY with a valid JSON object (no markdown, no backticks):
{
  "score": <0-100 integer, hallucination risk>,
  "verdict": "<high|medium|low>",
  "flags": [
    {
      "severity": "<high|medium|low>",
      "type": "<type of issue>",
      "detail": "<specific explanation of the issue>"
    }
  ],
  "summary": "<2-3 sentence overall assessment>"
}

Rules:
- score 70-100 = high risk, 35-69 = medium, 0-34 = low
- Be specific about what text triggered each flag
- If text looks mostly fine, give low score and say so
- Max 5 flags`;

    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const raw = data.content[0].text.trim();
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    showResults(result);
  } catch (e) {
    alert('Error analyzing text. Please try again.\n' + e.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'Analyze for Hallucinations';
  }
}

function showResults(r) {
  document.getElementById('input-card').style.display = 'none';
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';

  // Verdict
  const vmap = { high: ['🚨', 'HIGH RISK'], medium: ['⚠️', 'MEDIUM RISK'], low: ['✅', 'LOW RISK'] };
  const [icon, label] = vmap[r.verdict] || ['✅', 'LOW RISK'];
  document.getElementById('verdict-wrap').innerHTML =
    `<div class="verdict ${r.verdict}">${icon} ${label} — Hallucination Detected</div>`;

  // Score bar
  const color = r.verdict === 'high' ? 'var(--accent)' : r.verdict === 'medium' ? 'var(--warning)' : 'var(--safe)';
  const fill = document.getElementById('scoreFill');
  fill.style.background = color;
  document.getElementById('scoreNum').textContent = r.score + '%';
  setTimeout(() => { fill.style.width = r.score + '%'; }, 100);

  // Flags
  const smap = { high: '🔴', medium: '🟡', low: '🟢' };
  const flagsHtml = (r.flags || []).map((f, i) =>
    `<div class="flag-item ${f.severity}" style="animation-delay:${i*0.08}s">
      <span class="flag-icon">${smap[f.severity] || '🟡'}</span>
      <div class="flag-text"><strong>${f.type}</strong>${f.detail}</div>
    </div>`
  ).join('') || '<div class="flag-item low"><span class="flag-icon">✅</span><div class="flag-text">No significant issues detected.</div></div>';
  document.getElementById('flagsList').innerHTML = flagsHtml;

  // Summary
  document.getElementById('summaryBox').textContent = r.summary;
}

function reset() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('input-card').style.display = 'block';
  document.getElementById('inputText').value = '';
}
</script>
</body>
</html>
